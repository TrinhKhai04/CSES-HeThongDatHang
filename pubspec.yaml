# 📦 Tên & mô tả ứng dụng
name: cses
description: "CSES Apple Store - Modern Flutter E-commerce App"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  #  google_polyline_algorithm: ^3.1.0
  google_polyline_algorithm: ^3.1.0

  # 🔥 AI-Gemini
  google_generative_ai: ^0.4.4
  flutter_dotenv: ^5.1.0

  # 🔥 Firebase
  firebase_core: ^3.4.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1
  firebase_storage: ^12.2.0

  # ☁️ Cloudinary
  cloudinary_public: ^0.23.1

  # 🔑 Google Sign-In
  google_sign_in: ^6.2.1

  # 💡 State Management
  provider: ^6.1.2

  # 💾 Local Database & Utilities
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.5
  shared_preferences: ^2.2.3

  # 📊 Export báo cáo / đơn hàng
  excel: ^4.0.0
  permission_handler: ^11.3.0
  file_saver: ^0.3.1

  # 🧾 PDF
  pdf: ^3.11.0
  printing: ^5.13.0

  # 📤 Chia sẻ file (Excel, PDF...) -> Drive, Gmail, Zalo...
  share_plus: ^10.0.0

  # 🖼️ Image Handling
  image_picker: ^1.2.0
  cached_network_image: ^3.3.1
  mime: ^1.0.5

  # 💅 UI & Fonts
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter

  # ℹ️ App info (hiện version trên màn hình đăng nhập)
  package_info_plus: ^8.0.0

  # 📊 Biểu đồ
  fl_chart: ^0.68.0

  # 🌍 HTTP / API
  http: ^1.2.2
  diacritic: ^0.1.6

  # 📬 URL Launcher — mở email / web / gọi điện
  url_launcher: ^6.3.0

  # 🌐 MAP (OpenStreetMap)
  flutter_map: ^7.0.2
  flutter_map_marker_cluster: ^1.2.0
  latlong2: ^0.9.1
  geolocator: ^13.0.1

  # 🎰 Mini game
  flutter_fortune_wheel: ^1.3.0
  youtube_player_iframe: ^5.2.2
  confetti: ^0.7.0
  audioplayers: ^6.1.0

  # 🎬 Shopee-style Video (NEW)
  video_player: ^2.8.2
  visibility_detector: ^0.4.0
  file_picker: ^8.1.2
  flutter_cache_manager: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/google_logo.png
    - assets/config/env.json
    - assets/images/bank_qr.png
    - assets/images/momo_qr.png
    - assets/images/cses_logo.png
    - assets/fonts/Inter-Regular.ttf
    - assets/fonts/Merriweather-Bold.ttf
    - assets/fonts/Roboto-Regular.ttf
    - assets/fonts/Roboto-Bold.ttf
    - assets/sounds/lever_click.mp3
    - assets/sounds/reel_tick.mp3
    - assets/sounds/win_small.mp3
    - assets/sounds/jackpot_big.mp3

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
    - family: Merriweather
      fonts:
        - asset: assets/fonts/Merriweather-Bold.ttf
          weight: 700
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
          weight: 400
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
